repos:
  # General hygiene hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-xml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: mixed-line-ending
        args: ['--fix=crlf']

  # C# formatting via dotnet format
  - repo: local
    hooks:
      - id: dotnet-format
        name: dotnet format
        entry: dotnet format --include
        language: system
        types_or: [c#]
        pass_filenames: true

  # PowerShell linting via PSScriptAnalyzer
  - repo: local
    hooks:
      - id: psscriptanalyzer
        name: PSScriptAnalyzer
        entry: powershell.exe -NoProfile -Command "Get-ChildItem -Filter *.ps1 -Recurse build/ | ForEach-Object { $results = Invoke-ScriptAnalyzer -Path $_.FullName -Severity Warning,Error; if ($results) { $results | Format-Table -AutoSize; exit 1 } }"
        language: system
        files: '\.ps1$'
        pass_filenames: false
