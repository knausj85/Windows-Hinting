name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

env:
  BUILD_VERSION: 1.0.${{ github.run_number }}

jobs:
  build-debug:
    name: Debug Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: dotnet restore HintOverlay.csproj

      - name: Build Debug (exe only)
        run: build\build-complete.bat Debug --exe-only

      - name: Upload Debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: HintOverlay-Debug
          path: bin\Debug\net8.0-windows\HintOverlay.exe
          if-no-files-found: error

  build-release:
    name: Release Build + MSI
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install WiX Toolset
        # Version must match WixToolset.Sdk version in HintOverlay.Installer2.wixproj
        run: dotnet tool install --global wix --version 6.0.2

      - name: Restore NuGet packages
        run: dotnet restore HintOverlay.csproj

      - name: Decode signing certificate
        shell: pwsh
        env:
          CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
        run: |
          if ($env:CERT_BASE64) {
            $certPath = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
            [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:CERT_BASE64))
            "CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Append
            Write-Host "Signing certificate decoded to $certPath"
          } else {
            Write-Host "SIGNING_CERT_BASE64 secret not configured — build will be unsigned"
          }

      - name: Build Release + MSI
        shell: pwsh
        env:
          CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          if ($env:CERT_PATH) {
            Write-Host "Building with code signing (cert: $env:CERT_PATH)"
            .\build\build-complete.ps1 -Configuration Release -CertPath $env:CERT_PATH -CertPassword $env:CERT_PASSWORD
          } else {
            Write-Host "Building without code signing"
            .\build\build-complete.ps1 -Configuration Release -SkipSigning
          }

      - name: Clean up signing certificate
        if: always()
        shell: pwsh
        run: |
          if ($env:CERT_PATH -and (Test-Path $env:CERT_PATH)) {
            Remove-Item $env:CERT_PATH -Force
            Write-Host "Signing certificate removed"
          }

      - name: Upload Release exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: HintOverlay-Release
          path: bin\Release\net8.0-windows\HintOverlay.exe
          if-no-files-found: error

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: HintOverlay-Installer
          path: HintOverlay.Installer2\bin\Release\en-US\HintOverlay.msi
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-debug, build-release]
    # Only publish a release on direct pushes to main — not PRs or other branches
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Download Release exe
        uses: actions/download-artifact@v4
        with:
          name: HintOverlay-Release
          path: artifacts

      - name: Download MSI installer
        uses: actions/download-artifact@v4
        with:
          name: HintOverlay-Installer
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.BUILD_VERSION }}
          name: v${{ env.BUILD_VERSION }}
          generate_release_notes: true
          make_latest: true
          files: |
            artifacts/HintOverlay.exe
            artifacts/HintOverlay.msi
