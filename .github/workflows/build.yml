name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_VERSION: 0.1.${{ github.run_number }}

defaults:
  run:
    shell: pwsh

jobs:
  lint:
    name: Pre-commit Lint
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install PSScriptAnalyzer
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

      - name: Auto-fix and commit
        if: failure() && github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix pre-commit hook violations"

  build-debug:
    name: Debug Build
    needs: lint
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3

      - name: Restore NuGet packages
        run: dotnet restore Windows-Hinting\Windows-Hinting.csproj

      - name: Build Debug (exe only)
        run: build\build-complete.bat Debug --exe-only

      - name: Clean Debug output
        run: |
          $outDir = "Windows-Hinting\bin\Debug\net8.0-windows"
          Remove-Item "$outDir\xunit.*" -Force -ErrorAction SilentlyContinue

      - name: Upload Debug artifact
        uses: actions/upload-artifact@v7
        with:
          name: Windows-Hinting-Debug
          path: Windows-Hinting\bin\Debug\net8.0-windows\
          if-no-files-found: error

  build-release:
    name: Release Build + MSI
    needs: lint
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3

      - name: Install WiX Toolset
        # Version must match WixToolset.Sdk version in Windows-Hinting.Installer.wixproj
        run: dotnet tool install --global wix --version 6.0.2

      - name: Restore NuGet packages
        run: dotnet restore Windows-Hinting\Windows-Hinting.csproj

      - name: Decode signing certificate
        env:
          CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
        run: |
          if ($env:CERT_BASE64) {
            $certPath = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
            [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:CERT_BASE64))
            "CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Append
            Write-Host "Signing certificate decoded to $certPath"
          } else {
            Write-Host "SIGNING_CERT_BASE64 secret not configured — build will be unsigned"
          }

      - name: Build Release + MSI
        env:
          CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          Write-Host "--- Signing params (debug) ---"
          Write-Host "  CERT_PATH set : $(if ($env:CERT_PATH) { 'yes — ' + $env:CERT_PATH } else { 'no' })"
          Write-Host "  CERT_PASSWORD : $(if ($env:CERT_PASSWORD) { '(set)' } else { '(empty — secret not configured)' })"
          Write-Host "------------------------------"
          if ($env:CERT_PATH) {
            Write-Host "Building with code signing (cert: $env:CERT_PATH)"
            .\build\build-complete.ps1 -Configuration Release -CertPath $env:CERT_PATH -CertPassword $env:CERT_PASSWORD
          } else {
            Write-Host "Building without code signing"
            .\build\build-complete.ps1 -Configuration Release -SkipSigning
          }

      - name: Clean up signing certificate
        if: always()
        run: |
          if ($env:CERT_PATH -and (Test-Path $env:CERT_PATH)) {
            Remove-Item $env:CERT_PATH -Force
            Write-Host "Signing certificate removed"
          }

      - name: Verify exe signature
        run: |
          $exePath = "Windows-Hinting\bin\Release\net8.0-windows\Windows-Hinting.exe"
          Write-Host "--- Signature verification ---"
          if (-not (Test-Path $exePath)) {
            Write-Host "  ERROR: exe not found at $exePath"
          } else {
            $sig = Get-AuthenticodeSignature -FilePath $exePath
            Write-Host "  Status       : $($sig.Status)"
            Write-Host "  StatusMessage: $($sig.StatusMessage)"
            if ($sig.SignerCertificate) {
              Write-Host "  Signer       : $($sig.SignerCertificate.Subject)"
              Write-Host "  Valid until  : $($sig.SignerCertificate.NotAfter)"
            } else {
              Write-Host "  Signer       : (none — exe is unsigned)"
            }
          }
          Write-Host "------------------------------"

      - name: Upload Release exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: Windows-Hinting-Release
          path: Windows-Hinting\bin\Release\net8.0-windows\Windows-Hinting.exe
          if-no-files-found: error

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v7
        with:
          name: Windows-Hinting-Installer
          path: Windows-Hinting.Installer\bin\Release\en-US\Windows-Hinting.msi
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-debug, build-release]
    # Only publish a release on direct pushes to main — not PRs or other branches
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download Debug build
        uses: actions/download-artifact@v8
        with:
          name: Windows-Hinting-Debug
          path: artifacts/Windows-Hinting-Debug

      - name: Zip Debug build
        run: cd artifacts && zip -r Windows-Hinting-Debug.zip Windows-Hinting-Debug/

      - name: Download MSI installer
        uses: actions/download-artifact@v8
        with:
          name: Windows-Hinting-Installer
          path: artifacts

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ env.BUILD_VERSION }}
          name: v${{ env.BUILD_VERSION }}
          generateReleaseNotes: true
          makeLatest: true
          body: |
            ## Downloads

            | Asset | Description |
            |---|---|
            | **Windows-Hinting-Debug.zip** | Debug build (portable) — no UIAccess, no certificate required. Extract the zip and run `Windows-Hinting.exe`. Requires [.NET 8 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/8.0). |
            | **Windows-Hinting.msi** | Installer (Release build with UIAccess) — requires the signing certificate to be manually installed as a trusted root certificate. See the [UIAccess setup guide](https://github.com/knausj85/Windows-Hinting/blob/main/UIACCESS_QUICKSTART.md) for instructions. |
          artifacts: |
            artifacts/Windows-Hinting-Debug.zip
            artifacts/Windows-Hinting.msi
